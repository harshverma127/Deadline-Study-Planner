<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 50%, #fce7f3 100%);
    }

    /* Floating background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 400px; height: 400px; background: #c4b5fd; top: -100px; left: -100px; }
    .blob-2 { width: 300px; height: 300px; background: #93c5fd; bottom: -80px; right: -80px; }
    .blob-3 { width: 200px; height: 200px; background: #f9a8d4; top: 50%; left: 60%; }

    /* Auth card */
    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1rem;
    }

    .auth-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(99,91,191,0.18);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .auth-logo .icon { font-size: 2.75rem; margin-bottom: 0.5rem; display: block; }
    .auth-logo h1 {
      font-family: var(--font-accent);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text-dark);
    }
    .auth-logo p { color: var(--text-mid); font-size: 0.875rem; margin-top: 0.25rem; }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.5rem;
      border: none;
      border-radius: calc(var(--radius-sm) - 2px);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--text-light);
      transition: all 0.2s ease;
    }
    .auth-tab.active {
      background: white;
      color: var(--lavender-dark);
      box-shadow: var(--shadow-sm);
    }

    /* Form panels */
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--lavender-dark), var(--sky-dark));
      color: white;
      border: none;
      font-family: var(--font-body);
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(167,139,250,0.4);
    }
    .submit-btn:active { transform: translateY(0); }

    .footer-note {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--text-light);
    }
  </style>
</head>
<body>
  <!-- Background decoration -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="icon">📚</span>
        <h1>Study Planner</h1>
        <p>Deadline-aware scheduling for students</p>
      </div>

      <!-- Alert box -->
      <div id="alert" class="alert"></div>

      <!-- Tabs: Login | Register -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab"        onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN PANEL -->
      <div id="panel-login" class="auth-panel active">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="submit-btn" onclick="handleLogin()">Login →</button>
      </div>

      <!-- REGISTER PANEL -->
      <div id="panel-register" class="auth-panel">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password <small style="font-weight:400;color:var(--text-light)">(min 6 chars)</small></label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <button class="submit-btn" onclick="handleRegister()">Create Account →</button>
      </div>

      <p class="footer-note">📖 Your personal study companion</p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (api.isLoggedIn()) {
      window.location.href = '/dashboard';
    }

    // Switch between Login and Register tabs
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    }

    // Handle Login form submission
    async function handleLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        return showAlert('alert', 'Please enter your email and password');
      }

      try {
        const data = await api.post('/auth/login', { email, password });
        // Save token and user info to localStorage
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        showAlert('alert', err.message);
      }
    }

    // Handle Register form submission
    async function handleRegister() {
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;

      if (!name || !email || !password) {
        return showAlert('alert', 'All fields are required');
      }

      try {
        const data = await api.post('/auth/register', { name, email, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('alert', 'Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard', 1000);
      } catch (err) {
        showAlert('alert', err.message);
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const loginPanel = document.getElementById('panel-login');
        if (loginPanel.classList.contains('active')) handleLogin();
        else handleRegister();
      }
    });
  </script>
</body>
</html>
