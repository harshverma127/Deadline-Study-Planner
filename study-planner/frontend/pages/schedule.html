<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — Study Planner</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ── Generate Banner ── */
    .generate-banner {
      background: linear-gradient(135deg, var(--lavender), var(--sky));
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.75rem;
      box-shadow: var(--shadow-md);
    }
    .generate-banner .banner-text h2 {
      font-family: var(--font-accent);
      font-size: 1.2rem;
      color: var(--text-dark);
      margin-bottom: 0.2rem;
    }
    .generate-banner .banner-text p {
      font-size: 0.85rem;
      color: var(--text-mid);
    }

    /* ── Day Groups ── */
    .day-group {
      margin-bottom: 1.5rem;
    }
    .day-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .day-label {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .day-badge {
      padding: 0.2rem 0.65rem;
      background: var(--lavender);
      color: var(--lavender-dark);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .day-badge.today { background: var(--sage); color: #065f46; }
    .day-badge.tomorrow { background: var(--cream); color: #92400e; }
    .day-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Schedule Entry Cards ── */
    .schedule-entry {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      margin-bottom: 0.6rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 1rem;
      align-items: center;
      transition: transform 0.15s ease;
    }
    .schedule-entry:hover { transform: translateX(3px); box-shadow: var(--shadow-md); }
    .schedule-entry.done { opacity: 0.5; }

    .time-slot {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--lavender-dark);
      background: var(--lavender);
      padding: 0.3rem 0.5rem;
      border-radius: var(--radius-sm);
      text-align: center;
      line-height: 1.4;
    }

    .entry-title {
      font-size: 0.93rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 0.3rem;
    }
    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
      font-size: 0.77rem;
      color: var(--text-mid);
    }

    /* ── View Tabs ── */
    .view-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .view-tab {
      padding: 0.4rem 1rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: white;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-mid);
      transition: all 0.15s ease;
    }
    .view-tab.active {
      background: var(--lavender);
      border-color: var(--lavender-dark);
      color: var(--lavender-dark);
    }

    /* ── Weekly Overview ── */
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .week-day {
      background: white;
      border-radius: var(--radius-sm);
      padding: 0.75rem 0.4rem;
      text-align: center;
      border: 1.5px solid var(--border);
      min-height: 80px;
    }
    .week-day.today { border-color: var(--lavender-dark); background: var(--lavender); }
    .week-day .wd-name {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-light);
    }
    .week-day .wd-date {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-dark);
      margin: 0.2rem 0;
    }
    .week-day .wd-count {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--lavender-dark);
    }
    .week-day.today .wd-name,
    .week-day.today .wd-count { color: var(--lavender-dark); }

    @media (max-width: 768px) {
      .schedule-entry { grid-template-columns: 85px 1fr; }
      .entry-actions  { display: none; }
      .week-grid      { grid-template-columns: repeat(4, 1fr); }
      .generate-banner { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <script src="/js/app.js"></script>
  <script>
    requireAuth();
    setupNavbar();
  </script>

  <div class="page-container">
    <div class="page-header">
      <h1>Study Schedule</h1>
      <p>Auto-generated from your tasks, sorted by deadline and priority.</p>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Generate Banner -->
    <div class="generate-banner">
      <div class="banner-text">
        <h2>🧠 Smart Scheduling</h2>
        <p>Click to regenerate your schedule based on current tasks. Max 4 tasks/day, spread across deadlines.</p>
      </div>
      <button class="btn btn-primary" onclick="generateSchedule()" id="gen-btn">
        ⚡ Generate Schedule
      </button>
    </div>

    <!-- View Toggle -->
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView('list', this)">📋 List View</button>
      <button class="view-tab" onclick="switchView('week', this)">📅 Weekly Overview</button>
    </div>

    <!-- Weekly Overview (hidden by default) -->
    <div id="view-week" style="display:none">
      <div class="week-grid" id="week-grid"></div>
    </div>

    <!-- List View -->
    <div id="view-list">
      <div id="schedule-container">
        <div class="spinner"></div>
      </div>
    </div>

  </div>

  <script>
    let scheduleData = [];

    // Switch between list and weekly view
    function switchView(view, btn) {
      document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-list').style.display = view === 'list' ? 'block' : 'none';
      document.getElementById('view-week').style.display = view === 'week' ? 'block' : 'none';
    }

    // Call backend to generate schedule (Processing Module)
    async function generateSchedule() {
      const btn = document.getElementById('gen-btn');
      btn.textContent = '⏳ Generating...';
      btn.disabled = true;

      try {
        await api.get('/schedule/generate');
        showAlert('alert', '✅ Schedule generated successfully!', 'success');
        loadSchedule();
      } catch (err) {
        showAlert('alert', err.message);
      } finally {
        btn.textContent = '⚡ Generate Schedule';
        btn.disabled = false;
      }
    }

    // Load existing schedule (Output Module)
    async function loadSchedule() {
      try {
        scheduleData = await api.get('/schedule');
        renderScheduleList(scheduleData);
        renderWeekGrid(scheduleData);
      } catch (err) {
        document.getElementById('schedule-container').innerHTML =
          '<p style="color:var(--text-light)">Failed to load schedule.</p>';
      }
    }

    // Render grouped list view
    function renderScheduleList(schedule) {
      const container = document.getElementById('schedule-container');

      if (schedule.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="emoji">📭</div>
            <h3>No schedule yet</h3>
            <p>Add some tasks and click <strong>Generate Schedule</strong> to create your study plan.</p>
          </div>`;
        return;
      }

      // Group entries by date
      const grouped = {};
      schedule.forEach(entry => {
        if (!grouped[entry.date]) grouped[entry.date] = [];
        grouped[entry.date].push(entry);
      });

      const today = formatDate2(new Date());
      const tomorrow = formatDate2(new Date(Date.now() + 86400000));

      let html = '';
      Object.keys(grouped).sort().forEach(date => {
        const entries = grouped[date];
        const isToday    = date === today;
        const isTomorrow = date === tomorrow;
        const label      = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : formatDate(date);
        const badgeClass = isToday ? 'today' : isTomorrow ? 'tomorrow' : '';

        html += `
          <div class="day-group">
            <div class="day-header">
              <span class="day-label">${label}</span>
              <span class="day-badge ${badgeClass}">${entries.length} task${entries.length > 1 ? 's' : ''}</span>
              <div class="day-line"></div>
            </div>
        `;

        entries.forEach(entry => {
          html += `
            <div class="schedule-entry ${entry.status === 'done' ? 'done' : ''}">
              <div class="time-slot">${entry.time_slot.replace(' - ', '\n')}</div>
              <div>
                <div class="entry-title">${entry.title}</div>
                <div class="entry-meta">
                  <span class="badge badge-subject">📖 ${entry.subject_name}</span>
                  ${priorityBadge(entry.priority)}
                  <span style="color:var(--text-light)">•</span>
                  <span>📅 Due: ${formatDate(entry.deadline)}</span>
                  <span style="color:var(--text-light)">•</span>
                  <span>⏱ ${entry.estimated_time}h</span>
                  ${entry.status === 'done' ? '<span class="badge badge-done">✓ Done</span>' : ''}
                </div>
              </div>
              <div class="entry-actions">
                ${entry.status === 'pending'
                  ? `<button class="btn btn-success btn-sm" onclick="markDone(${entry.task_id})">✓</button>`
                  : ''
                }
              </div>
            </div>
          `;
        });

        html += '</div>';
      });

      container.innerHTML = html;
    }

    // Render weekly overview grid (next 7 days)
    function renderWeekGrid(schedule) {
      const grid = document.getElementById('week-grid');
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const today = new Date(); today.setHours(0,0,0,0);

      // Count tasks per date
      const tasksByDate = {};
      schedule.forEach(e => {
        tasksByDate[e.date] = (tasksByDate[e.date] || 0) + 1;
      });

      let html = '';
      for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const dateStr = formatDate2(d);
        const isToday = i === 0;
        const count   = tasksByDate[dateStr] || 0;

        html += `
          <div class="week-day ${isToday ? 'today' : ''}">
            <div class="wd-name">${days[d.getDay()]}</div>
            <div class="wd-date">${d.getDate()}</div>
            <div class="wd-count">${count > 0 ? `${count} task${count > 1 ? 's' : ''}` : '—'}</div>
          </div>
        `;
      }
      grid.innerHTML = html;
    }

    // Helper: format date as YYYY-MM-DD for comparison
    function formatDate2(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    // Mark a task as done from the schedule
    async function markDone(taskId) {
      try {
        await api.put(`/tasks/${taskId}`, { status: 'done' });
        loadSchedule();
      } catch (err) {
        showAlert('alert', err.message);
      }
    }

    // Init
    loadSchedule();
  </script>
</body>
</html>
